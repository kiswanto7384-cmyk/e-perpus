<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirkulasi Realtime - E-Perpus SDN 169</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        .input-active { border-color: #4f46e5 !important; background-color: #f8fafc !important; }
        .loading-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .dot { transition: all 0.3s ease-in-out; }
        input:checked ~ .dot { transform: translateX(100%); background-color: #4f46e5; }
        input:checked ~ .block-bg { background-color: #e0e7ff; border-color: #c7d2fe; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 py-3 mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="menu-perpus.html" class="flex items-center gap-2">
                <span class="text-xl">🏠</span>
                <span class="font-black text-indigo-900 italic text-sm uppercase">Menu Utama</span>
            </a>
            <a href="pengembalian.html" class="px-3 py-2 rounded-xl text-[9px] font-black uppercase bg-indigo-100 text-indigo-600 shadow-sm hover:bg-indigo-200">📑 Log Pengembalian</a>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-4">
        <div class="bg-indigo-600 text-white p-6 rounded-[2.5rem] shadow-xl mb-6 border-b-8 border-indigo-800 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black uppercase italic leading-none text-yellow-400">Kasir Sirkulasi 🔄</h1>
                <p class="text-[9px] font-bold opacity-80 uppercase tracking-widest mt-2 italic">Akses Realtime - SDN 169</p>
            </div>
        </div>

        <div class="flex items-center justify-center mb-6 gap-4 bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
            <span class="text-[10px] font-black uppercase text-slate-400 italic">Mode Input:</span>
            <label class="flex items-center cursor-pointer select-none">
                <div class="relative">
                    <input type="checkbox" id="modeScannerEksternal" class="sr-only" onchange="toggleScannerMode(this.checked)">
                    <div class="block-bg bg-slate-100 border-2 border-slate-200 w-14 h-8 rounded-full transition-all"></div>
                    <div class="dot absolute left-1 top-1 bg-slate-400 w-6 h-6 rounded-full transition-all flex items-center justify-center text-[10px]">📷</div>
                </div>
                <div class="ml-3 text-[10px] font-black uppercase text-slate-600 tracking-wider" id="labelMode">Scan Kamera</div>
            </label>
        </div>

        <div id="statusScanner" class="mb-4 text-center hidden">
            <span class="bg-emerald-100 text-emerald-600 text-[8px] font-black px-4 py-1 rounded-full uppercase animate-pulse">External Scanner Ready 🔌</span>
        </div>

        <div id="scannerArea" class="hidden mb-6 rounded-[2.5rem] overflow-hidden border-4 border-indigo-500 bg-black relative shadow-2xl">
            <div id="reader" style="width: 100%; min-height: 250px;"></div>
            <button onclick="tutupScanner()" class="w-full bg-red-600 text-white py-4 font-black text-xs uppercase tracking-widest">Batal Scan ❌</button>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200 space-y-4">
            
            <div class="relative">
                <label class="text-[8px] font-black text-slate-400 ml-3 uppercase italic">1. Identitas Peminjam</label>
                <input type="text" id="nisSiswa" autocomplete="off" oninput="cariSiswa(this.value.trim())" onclick="this.select()" placeholder="ID SISWA / SCAN..." 
                    class="w-full p-5 bg-slate-50 rounded-2xl font-black outline-none border-2 border-transparent focus:border-indigo-500 uppercase text-sm tracking-widest transition-all">
                <button id="btnScanSiswa" onclick="bukaScanner('nisSiswa')" class="absolute right-2 top-[22px] bottom-2 bg-indigo-600 text-white px-4 rounded-xl font-black text-[10px] hover:bg-indigo-700 transition-all">📷 SCAN</button>
            </div>

            <div id="infoSiswa" class="hidden p-5 rounded-2xl border-2 transition-all duration-300">
                <div class="flex items-center gap-4">
                    <div id="iconSiswa" class="text-3xl">👤</div>
                    <div>
                        <p id="namaSiswaDisplay" class="font-black text-indigo-900 uppercase text-sm leading-tight"></p>
                        <p id="kelasSiswaDisplay" class="text-[10px] font-bold text-slate-500 uppercase"></p>
                    </div>
                </div>
            </div>

            <hr class="border-slate-100">

            <div class="relative">
                <label class="text-[8px] font-black text-slate-400 ml-3 uppercase italic">2. Barcode / Kode Buku</label>
                <input type="text" id="barcodeBuku" autocomplete="off" oninput="cariBuku(this.value.trim())" onclick="this.select()" placeholder="KODE BUKU / SCAN..." 
                    class="w-full p-5 bg-slate-50 rounded-2xl font-black outline-none border-2 border-transparent focus:border-orange-500 uppercase text-sm tracking-widest transition-all">
                <button id="btnScanBuku" onclick="bukaScanner('barcodeBuku')" class="absolute right-2 top-[22px] bottom-2 bg-orange-500 text-white px-4 rounded-xl font-black text-[10px] hover:bg-orange-600 transition-all">📷 SCAN</button>
            </div>

            <div id="infoBuku" class="hidden p-5 rounded-2xl border-2 transition-all duration-300">
                <div class="flex items-center gap-4">
                    <div id="iconBuku" class="text-3xl">📖</div>
                    <div>
                        <p id="judulBukuDisplay" class="font-black text-slate-900 uppercase text-sm leading-tight"></p>
                        <p id="stokBukuDisplay" class="text-[10px] font-bold uppercase"></p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-4">
                <button id="btnPinjam" onclick="prosesTransaksi('PINJAM')" class="bg-indigo-600 text-white font-black py-5 rounded-3xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all uppercase italic text-xs tracking-widest">Pinjam 📤</button>
                <button id="btnKembali" onclick="prosesTransaksi('KEMBALI')" class="bg-emerald-500 text-white font-black py-5 rounded-3xl shadow-lg hover:bg-emerald-600 active:scale-95 transition-all uppercase italic text-xs tracking-widest">Kembali 📥</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://e-perpus-a652c-default-rtdb.asia-southeast1.firebasedatabase.app" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let html5QrCode = null;
        let isExternalMode = false;

        function toggleScannerMode(checked) {
            isExternalMode = checked;
            const label = document.getElementById('labelMode');
            const indicator = document.getElementById('statusScanner');
            const dot = document.querySelector('.dot');
            if (checked) {
                label.innerText = "Mode Alat Scanner (USB)";
                indicator.classList.remove('hidden');
                dot.innerText = "🔌";
                tutupScanner(); 
                document.getElementById('nisSiswa').focus();
            } else {
                label.innerText = "Scan Kamera";
                indicator.classList.add('hidden');
                dot.innerText = "📷";
            }
        }

        // Logic Cari Siswa & Buku tetap (Hanya Listener dinonaktifkan saat input kosong)
        function cariSiswa(nis) {
            const info = document.getElementById('infoSiswa');
            if(!nis) { info.classList.add('hidden'); return; }
            db.ref('anggota_perpus/' + nis).once('value', snap => {
                info.classList.remove('hidden');
                if(snap.exists()){
                    const s = snap.val();
                    document.getElementById('namaSiswaDisplay').innerText = s.nama;
                    document.getElementById('kelasSiswaDisplay').innerText = `KELAS: ${s.kelas} | STATUS: ${s.status}`;
                    info.className = "p-5 rounded-2xl border-2 bg-emerald-50 border-emerald-100";
                    document.getElementById('iconSiswa').innerText = "✅";
                } else {
                    document.getElementById('namaSiswaDisplay').innerText = "TIDAK TERDAFTAR";
                    info.className = "p-5 rounded-2xl border-2 bg-red-50 border-red-100";
                    document.getElementById('iconSiswa').innerText = "❌";
                }
            });
        }

        function cariBuku(barcode) {
            const info = document.getElementById('infoBuku');
            if(!barcode) { info.classList.add('hidden'); return; }
            db.ref('koleksi_buku/' + barcode).once('value', snap => {
                info.classList.remove('hidden');
                if(snap.exists()){
                    const b = snap.val();
                    document.getElementById('judulBukuDisplay').innerText = b.judul;
                    document.getElementById('stokBukuDisplay').innerText = `STOK: ${b.stok_tersedia} | TOTAL: ${b.stok_total}`;
                    document.getElementById('stokBukuDisplay').className = "text-[10px] font-bold uppercase " + (b.stok_tersedia > 0 ? "text-emerald-600" : "text-red-600");
                    info.className = "p-5 rounded-2xl border-2 bg-orange-50 border-orange-200";
                    document.getElementById('iconBuku').innerText = "📖";
                } else {
                    document.getElementById('judulBukuDisplay').innerText = "TIDAK DITEMUKAN";
                    info.className = "p-5 rounded-2xl border-2 bg-red-50 border-red-100";
                    document.getElementById('iconBuku').innerText = "❓";
                }
            });
        }

        // --- PENGUATAN SISTEM PINJAM & KEMBALI ---
        async function prosesTransaksi(tipe) {
            const btn = (tipe === 'PINJAM') ? document.getElementById('btnPinjam') : document.getElementById('btnKembali');
            const nis = document.getElementById('nisSiswa').value.trim();
            const barcode = document.getElementById('barcodeBuku').value.trim();
            const nama = document.getElementById('namaSiswaDisplay').innerText;
            const judul = document.getElementById('judulBukuDisplay').innerText;
            
            if(!nis || !barcode || nama.includes("TIDAK") || judul.includes("TIDAK")) {
                return alert("⚠️ Mohon lengkapi data siswa dan buku dengan benar!");
            }

            btn.disabled = true; // Mencegah double click/spam
            const tglSkrg = new Date().toLocaleString('id-ID');
            const tsSkrg = Date.now();

            try {
                if (tipe === 'PINJAM') {
                    // 1. Cek stok via Transaction (Aman dari bentrokan data)
                    const stokRef = db.ref(`koleksi_buku/${barcode}`);
                    const result = await stokRef.transaction(currentData => {
                        if (currentData && currentData.stok_tersedia > 0) {
                            currentData.stok_tersedia = (parseInt(currentData.stok_tersedia) || 0) - 1;
                            return currentData;
                        }
                        return; // Abort jika stok 0
                    });

                    if (!result.committed) throw new Error("❌ Stok buku habis atau tidak ditemukan!");

                    // 2. Simpan Laporan
                    await db.ref('perpus_laporan').push({
                        idSiswa: nis, namaSiswa: nama, idBuku: barcode, judulBuku: judul,
                        status: "DIPINJAM", waktuPinjam: tglSkrg, waktuKembali: "-", timestamp: tsSkrg
                    });
                    
                    alert(`✅ BERHASIL: ${nama} meminjam ${judul}`);
                } 
                else { // LOGIKA KEMBALI (Pencarian Spesifik)
                    // Cari record yang cocok: ID Siswa + ID Buku + Status DIPINJAM
                    const snap = await db.ref('perpus_laporan').orderByChild('idSiswa').equalTo(nis).once('value');
                    let targetKey = null;

                    snap.forEach(child => {
                        const val = child.val();
                        // Hanya ambil yang ID Bukunya sama DAN masih DIPINJAM (mengatasi judul sama)
                        if (val.idBuku === barcode && val.status === "DIPINJAM") {
                            targetKey = child.key; 
                        }
                    });

                    if (!targetKey) throw new Error("❌ Tidak ditemukan data peminjaman aktif untuk buku ini oleh siswa tersebut.");

                    // Update Laporan & Kembalikan Stok
                    await db.ref('perpus_laporan/' + targetKey).update({
                        status: "DIKEMBALIKAN", 
                        waktuKembali: tglSkrg,
                        timestamp_kembali: tsSkrg
                    });

                    await db.ref(`koleksi_buku/${barcode}`).transaction(b => {
                        if(b) b.stok_tersedia = (parseInt(b.stok_tersedia) || 0) + 1;
                        return b;
                    });

                    alert(`✅ BERHASIL: ${judul} telah dikembalikan oleh ${nama}`);
                }
                resetInput();
            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
            }
        }

        function resetInput() {
            document.getElementById('barcodeBuku').value = "";
            document.getElementById('infoBuku').classList.add('hidden');
            document.getElementById('barcodeBuku').focus();
        }

        // --- FITUR SCANNER (Tetap Seperti Semula) ---
        function bukaScanner(idTujuan) {
            if (isExternalMode) return alert("Matikan Mode Alat Scanner!");
            document.getElementById('scannerArea').classList.remove('hidden');
            if(html5QrCode) html5QrCode.stop();
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 25, qrbox: 250 }, (txt) => {
                const hasil = txt.trim();
                const target = document.getElementById(idTujuan);
                target.value = hasil;
                if(idTujuan === 'nisSiswa') {
                    cariSiswa(hasil);
                    setTimeout(() => document.getElementById('barcodeBuku').focus(), 500);
                } else {
                    cariBuku(hasil);
                }
                tutupScanner();
            });
        }

        function tutupScanner() {
            if (html5QrCode) {
                html5QrCode.stop().finally(() => {
                    document.getElementById('scannerArea').classList.add('hidden');
                });
            }
        }
    </script>
</body>
</html>

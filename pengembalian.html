<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Perpus - Laporan Sirkulasi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 font-sans text-slate-800">

    <div class="max-w-5xl mx-auto">
        <div class="bg-indigo-700 p-6 rounded-[2rem] text-white shadow-lg mb-6 flex justify-between items-center border-b-8 border-indigo-900">
            <div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter text-yellow-400">Laporan Sirkulasi 📊</h1>
                <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Data Peminjaman & Pengembalian Realtime</p>
            </div>
            <div class="flex gap-2">
                <a href="pinjaman.html" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase transition-all">
                    🔄 Menu Kasir
                </a>
                <button onclick="downloadLaporan()" class="bg-emerald-500 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-lg transition-all active:scale-95">
                    📥 Unduh Excel
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="md:col-span-3 bg-white p-4 rounded-3xl shadow-sm border border-slate-200 flex gap-4 items-center">
                <input type="text" id="inputCari" oninput="filterLog()" placeholder="CARI NAMA SISWA ATAU JUDUL BUKU..." 
                    class="flex-1 px-6 py-3 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl outline-none font-bold text-xs uppercase transition-all">
            </div>
            <div id="totalPinjaman" class="bg-indigo-900 text-white flex items-center justify-center p-4 rounded-3xl text-[10px] font-black uppercase text-center">
                Memuat Data...
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left" id="tabelLogSirkulasi">
                    <thead>
                        <tr class="bg-slate-50 text-[9px] font-black uppercase text-slate-400 tracking-widest border-b">
                            <th class="p-5">Waktu</th>
                            <th class="p-5">Peminjam</th>
                            <th class="p-5">Judul Buku</th>
                            <th class="p-5 text-center">Status</th>
                            <th class="p-5 text-center">Denda</th>
                        </tr>
                    </thead>
                    <tbody id="tabelPinjaman" class="text-[11px] font-bold text-slate-600">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://e-perpus-a652c-default-rtdb.asia-southeast1.firebasedatabase.app" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- MONITOR DATA REALTIME ---
        function muatData() {
            db.ref('perpus_laporan').on('value', snap => {
                const body = document.getElementById('tabelPinjaman');
                const countEl = document.getElementById('totalPinjaman');
                let countActive = 0;
                body.innerHTML = "";

                if (!snap.exists()) {
                    body.innerHTML = `<tr><td colspan="5" class="p-10 text-center opacity-50">Belum ada data transaksi</td></tr>`;
                    countEl.innerText = "0 Pinjaman Aktif";
                    return;
                }

                const data = [];
                snap.forEach(c => { data.push({ key: c.key, ...c.val() }); });
                
                // Urutkan dari yang terbaru (berdasarkan timestamp)
                data.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));

                data.forEach(p => {
                    const isPinjam = p.status === "DIPINJAM";
                    if (isPinjam) countActive++;
                    
                    const stColor = isPinjam ? "text-amber-600 bg-amber-50" : "text-emerald-600 bg-emerald-50";
                    const waktu = p.waktuPinjam ? p.waktuPinjam.split(',')[0] : '-';
                    
                    body.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-indigo-50/30 transition-colors">
                            <td class="p-5 text-[9px] text-slate-400 font-medium">${waktu}</td>
                            <td class="p-5">
                                <div class="font-black uppercase text-indigo-900">${p.namaSiswa}</div>
                                <div class="text-[8px] text-slate-400">ID: ${p.idSiswa || '-'}</div>
                            </td>
                            <td class="p-5 text-slate-500 font-bold uppercase text-[10px]">${p.judulBuku}</td>
                            <td class="p-5 text-center">
                                <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${stColor}">
                                    ${isPinjam ? '⏳ ' + p.status : '✅ ' + p.status}
                                </span>
                            </td>
                            <td class="p-5 text-center font-black ${p.denda_final > 0 ? 'text-red-500' : 'text-slate-300'}">
                                ${p.denda_final > 0 ? 'Rp ' + p.denda_final.toLocaleString() : '-'}
                            </td>
                        </tr>
                    `;
                });
                countEl.innerText = countActive + " Pinjaman Aktif";
            });
        }

        // --- FILTER PENCARIAN ---
        function filterLog() {
            const input = document.getElementById("inputCari").value.toUpperCase();
            const rows = document.getElementById("tabelPinjaman").rows;
            for (let i = 0; i < rows.length; i++) {
                rows[i].style.display = rows[i].textContent.toUpperCase().includes(input) ? "" : "none";
            }
        }

        // --- DOWNLOAD EXCEL ---
        function downloadLaporan() {
            const table = document.getElementById("tabelLogSirkulasi");
            const wb = XLSX.utils.table_to_book(table, { sheet: "Laporan Sirkulasi" });
            XLSX.writeFile(wb, `Laporan_Perpus_SDN169_${new Date().toLocaleDateString()}.xlsx`);
        }

        window.onload = muatData;
    </script>
</body>
</html>

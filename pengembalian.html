<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Perpus - Pengembalian Otomatis</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script> <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 font-sans text-slate-800">

    <div class="max-w-5xl mx-auto">
        <div class="bg-indigo-700 p-6 rounded-[2rem] text-white shadow-lg mb-6 flex justify-between items-center border-b-8 border-indigo-900">
            <div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter text-yellow-400">Pengembalian Otomatis ⚡</h1>
                <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Scan Buku untuk Mengembalikan Tanpa Klik</p>
            </div>
            <button onclick="downloadLaporan()" class="bg-emerald-500 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-lg transition-all active:scale-95">
                📥 Unduh Laporan
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="md:col-span-1 bg-white p-6 rounded-[2rem] shadow-xl border-t-8 border-indigo-500">
                <h3 class="font-black uppercase text-xs mb-4 text-center">Scan QR Buku Disini</h3>
                <div id="reader" class="rounded-2xl overflow-hidden bg-slate-100 border-4 border-slate-200"></div>
                <p class="text-[9px] text-center mt-3 font-bold text-slate-400 uppercase italic">Arahkan QR Code buku ke kamera</p>
            </div>

            <div class="md:col-span-2 bg-indigo-900 p-6 rounded-[2.5rem] text-white flex flex-col justify-center relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] font-black uppercase opacity-60 mb-2">Status Proses Terakhir:</p>
                    <div id="lastProcessStatus" class="text-xl font-black italic uppercase leading-tight">
                        Menunggu Scan...
                    </div>
                    <div id="lastProcessSub" class="text-[10px] mt-2 font-bold text-indigo-300 uppercase"></div>
                </div>
                <div class="absolute right-[-20px] bottom-[-20px] text-9xl opacity-10 rotate-12">📥</div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-3xl shadow-sm mb-6 border border-slate-200 flex gap-4 items-center">
            <input type="text" id="inputCari" oninput="filterLog()" placeholder="CARI NAMA ATAU JUDUL..." 
                class="flex-1 px-6 py-3 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl outline-none font-bold text-xs uppercase transition-all">
            <div id="totalPinjaman" class="bg-indigo-100 text-indigo-700 px-6 py-3 rounded-2xl text-[10px] font-black uppercase">
                Memuat...
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-200">
            <table class="w-full text-left" id="tabelLogSirkulasi">
                <thead>
                    <tr class="bg-slate-50 text-[9px] font-black uppercase text-slate-400 tracking-widest border-b">
                        <th class="p-5">Peminjam</th>
                        <th class="p-5">Judul Buku</th>
                        <th class="p-5 text-center">Status</th>
                        <th class="p-5 text-center">Denda</th>
                    </tr>
                </thead>
                <tbody id="tabelPinjaman" class="text-[11px] font-bold text-slate-600"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://e-perpus-a652c-default-rtdb.asia-southeast1.firebasedatabase.app" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const BATAS_HARI = 3;
        const DENDA_PER_HARI = 1000;
        let html5QrCode;

        // --- FUNGSI UTAMA: PROSES OTOMATIS SAAT SCAN ---
        async function prosesKembaliOtomatis(idBuku) {
            const statusEl = document.getElementById('lastProcessStatus');
            const subEl = document.getElementById('lastProcessSub');
            
            statusEl.innerText = "⏳ Memproses...";
            
            try {
                // 1. Cari transaksi yang masih "DIPINJAM" untuk buku ini
                const snap = await db.ref('perpus_laporan')
                                    .orderByChild('idBuku')
                                    .equalTo(idBuku)
                                    .once('value');

                let targetKey = null;
                let dataPeminjam = null;

                snap.forEach(child => {
                    if (child.val().status === "DIPINJAM") {
                        targetKey = child.key;
                        dataPeminjam = child.val();
                    }
                });

                if (!targetKey) {
                    statusEl.innerHTML = "❌ BUKU TIDAK TERDETEKSI SEDANG DIPINJAM";
                    subEl.innerText = `ID BUKU: ${idBuku}`;
                    return;
                }

                // 2. Hitung Denda Otomatis
                let dendaFinal = 0;
                if (dataPeminjam.timestamp) {
                    const selisihHari = Math.floor((Date.now() - dataPeminjam.timestamp) / (1000 * 60 * 60 * 24));
                    if (selisihHari > BATAS_HARI) {
                        dendaFinal = (selisihHari - BATAS_HARI) * DENDA_PER_HARI;
                    }
                }

                // 3. Update Database (Atomic)
                const updates = {};
                const tglSkrg = new Date().toLocaleString('id-ID');
                updates[`perpus_laporan/${targetKey}/status`] = "DIKEMBALIKAN";
                updates[`perpus_laporan/${targetKey}/waktuKembali`] = tglSkrg;
                updates[`perpus_laporan/${targetKey}/denda_final`] = dendaFinal;
                updates[`perpus_laporan/${targetKey}/waktu_proses`] = Date.now();

                await db.ref().update(updates);

                // 4. Update Stok & Saldo Denda
                await db.ref('koleksi_buku/' + idBuku + '/stok_tersedia').transaction(s => (parseInt(s) || 0) + 1);
                if (dendaFinal > 0 && dataPeminjam.idSiswa) {
                    await db.ref('anggota_perpus/' + dataPeminjam.idSiswa + '/saldo').transaction(s => (parseInt(s) || 0) - dendaFinal);
                }

                // 5. Berhasil!
                statusEl.innerHTML = `✅ ${dataPeminjam.namaSiswa} MENGEMBALIKAN BUKU`;
                subEl.innerText = `JUDUL: ${dataPeminjam.judulBuku} | DENDA: Rp ${dendaFinal.toLocaleString()}`;
                
                // Suara Notifikasi (Opsional)
                const audio = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');
                audio.play();

            } catch (error) {
                console.error(error);
                statusEl.innerText = "❌ ERROR SISTEM";
            }
        }

        // --- SETTING SCANNER ---
        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    // Jika terdeteksi, langsung proses
                    prosesKembaliOtomatis(decodedText);
                    // Beri jeda 3 detik sebelum bisa scan buku berikutnya agar tidak double input
                    html5QrCode.pause();
                    setTimeout(() => html5QrCode.resume(), 3000);
                }
            );
        }

        // --- MONITOR TABEL ---
        function muatData() {
            db.ref('perpus_laporan').on('value', snap => {
                const body = document.getElementById('tabelPinjaman');
                const countEl = document.getElementById('totalPinjaman');
                let countActive = 0;
                body.innerHTML = "";

                if (!snap.exists()) return;

                const data = [];
                snap.forEach(c => { data.push({ key: c.key, ...c.val() }); });
                data.sort((a,b) => (b.waktu_proses || b.timestamp) - (a.waktu_proses || a.timestamp));

                data.forEach(p => {
                    if (p.status === "DIPINJAM") countActive++;
                    const stColor = p.status === "DIPINJAM" ? "text-amber-600 bg-amber-50" : "text-emerald-600 bg-emerald-50";
                    
                    body.innerHTML += `
                        <tr class="border-b border-slate-50 hover:bg-slate-50">
                            <td class="p-5 font-black uppercase text-indigo-900">${p.namaSiswa}</td>
                            <td class="p-5 text-slate-500 font-bold uppercase text-[10px]">${p.judulBuku}</td>
                            <td class="p-5 text-center">
                                <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${stColor}">${p.status}</span>
                            </td>
                            <td class="p-5 text-center font-black ${p.denda_final > 0 ? 'text-red-500' : 'text-slate-300'}">
                                Rp ${(p.denda_final || 0).toLocaleString()}
                            </td>
                        </tr>
                    `;
                });
                countEl.innerText = countActive + " Pinjaman Aktif";
            });
        }

        function filterLog() {
            const input = document.getElementById("inputCari").value.toUpperCase();
            const rows = document.getElementById("tabelPinjaman").rows;
            for (let i = 0; i < rows.length; i++) {
                rows[i].style.display = rows[i].textContent.toUpperCase().includes(input) ? "" : "none";
            }
        }

        window.onload = () => {
            muatData();
            startScanner();
        };
    </script>
</body>
</html>
